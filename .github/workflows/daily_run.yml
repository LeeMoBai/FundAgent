name: 14:32 Daily AI Fund Agent

on:
  schedule:
    # 使用奇数分钟 32，避开全球 30/45 的排队高峰
    # UTC 06:32 = 北京时间 14:32 触发。排队几分钟后，刚好在 14:40 左右执行完毕
    # 1-5 代表只在周一到周五（A股交易日）运行，周末让它休息
    - cron: '27 5 * * 1-5'
  workflow_dispatch: # 保持允许手动点击

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run Main Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          WECHAT_ROBOT_KEY: ${{ secrets.WECHAT_ROBOT_KEY }}  # 👈 务必加上这行！
        run: |
          python main.py
